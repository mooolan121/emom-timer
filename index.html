<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMOM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111; --border: #222;
    --accent: #e8ff3c; --text: #f0f0f0; --muted: #555; --ready: #3cff8f;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 20px 16px 48px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(232,255,60,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,60,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .profile-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px;
  }
  .profile-screen.hidden { display: none; }
  .profile-logo { font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: var(--accent); letter-spacing: 8px; line-height: 1; text-shadow: 0 0 40px rgba(232,255,60,0.25); margin-bottom: 48px; }
  .profile-label { font-size: 9px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
  .profile-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
  .profile-btn { padding: 22px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 4px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .profile-btn:hover { border-color: var(--accent); color: var(--accent); }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 480px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(44px, 12vw, 64px); letter-spacing: 6px; color: var(--accent); line-height: 1; text-shadow: 0 0 30px rgba(232,255,60,0.25); }
  .profile-avatar { width: 42px; height: 42px; border-radius: 50%; background: #1a1a00; border: 1.5px solid var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); cursor: pointer; transition: all 0.15s; flex-shrink: 0; user-select: none; }
  .profile-avatar:hover { background: #2a2a00; box-shadow: 0 0 12px rgba(232,255,60,0.3); }

  .main-card { background: var(--surface); border: 1px solid var(--accent); border-radius: 4px; margin-bottom: 10px; overflow: hidden; position: relative; }
  .main-card-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.1s linear; }
  .main-card-meta { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; padding: 14px 16px 0; }
  .main-card-timer { font-family: 'Bebas Neue', sans-serif; font-size: clamp(80px, 26vw, 110px); line-height: 1; letter-spacing: 2px; color: var(--text); padding: 2px 16px 10px; border-bottom: 1px solid #1a1a1a; }
  .main-card-timer.warning { color: var(--accent); animation: pulse 0.5s infinite alternate; }
  .main-card-timer.go { color: var(--ready); }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
  .main-card-body { padding: 14px 16px 18px; }
  .ex-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 8vw, 38px); color: var(--text); letter-spacing: 2px; line-height: 1; margin-bottom: 6px; }
  .ex-reps { font-family: 'Bebas Neue', sans-serif; font-size: clamp(22px, 6vw, 28px); color: var(--accent); letter-spacing: 1px; }

  .next-card { background: var(--surface); border: 1px solid #444; border-radius: 4px; padding: 12px 16px; margin-bottom: 10px; }
  .next-label { font-size: 9px; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
  .next-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .next-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #bbb; letter-spacing: 2px; line-height: 1; }
  .next-reps { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #999; flex-shrink: 0; letter-spacing: 1px; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 8px; text-align: center; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); line-height: 1; }
  .stat-lbl { font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

  .lap-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
  .lap-dot { width: 32px; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.4s; }
  .lap-dot.done { background: var(--accent); }
  .lap-dot.current { background: var(--accent); animation: blink 1s infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .controls { display: flex; gap: 8px; margin-bottom: 10px; }
  .btn { flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
  .btn-primary:hover { background: #d4e832; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .bottom-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .btn-edit { padding: 8px 14px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .btn-edit:hover { border-color: var(--accent); color: var(--accent); }
  .wakelock-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 8px; letter-spacing: 1px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px; }
  .wakelock-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .wakelock-pill.active { border-color: #1a3a1a; color: var(--ready); }
  .wakelock-pill.active .wakelock-dot { background: var(--ready); box-shadow: 0 0 5px var(--ready); }

  .editor-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 150; overflow-y: auto; padding: 24px 16px 48px; }
  .editor-overlay.show { display: block; }
  .editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .editor-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); letter-spacing: 3px; }
  .editor-sub { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .editor-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin-bottom: 12px; }
  .editor-card-hdr { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  .editor-field { margin-bottom: 10px; }
  .editor-field label { display: block; font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .editor-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 10px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.15s; }
  .editor-field input:focus { border-color: var(--accent); }
  .editor-save { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; font-weight: 500; margin-top: 8px; }
  .editor-save:hover { background: #d4e832; }
  .editor-card { position: relative; }
  .editor-card-hdr { display: flex; align-items: center; justify-content: space-between; }
  .btn-remove-ex { background: transparent; border: 1px solid #333; border-radius: 3px; color: #555; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; padding: 3px 8px; cursor: pointer; transition: all 0.15s; }
  .btn-remove-ex:hover { border-color: #ff4d4d; color: #ff4d4d; }
  .btn-add-ex { width: 100%; padding: 12px; background: transparent; border: 1px dashed var(--border); border-radius: 4px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; margin-bottom: 12px; }
  .btn-add-ex:hover { border-color: var(--accent); color: var(--accent); }
  .editor-count-info { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-align: center; margin-bottom: 12px; }

  .countdown-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 90; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .countdown-overlay.show { display: flex; }
  .countdown-num { font-family: 'Bebas Neue', sans-serif; font-size: clamp(120px,40vw,200px); color: var(--accent); line-height: 1; animation: countPop 0.9s ease-out; }
  .countdown-num.go-text { color: var(--ready); font-size: clamp(80px,25vw,140px); }
  @keyframes countPop { 0%{transform:scale(1.4);opacity:0.2} 30%{transform:scale(1);opacity:1} 80%{transform:scale(1);opacity:1} 100%{transform:scale(0.8);opacity:0} }
  .countdown-label { font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-top: 8px; }

  .finish-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; }
  .finish-overlay.show { display: flex; }
  .finish-trophy { font-size: 64px; margin-bottom: 16px; }
  .finish-title { font-family: 'Bebas Neue', sans-serif; font-size: 56px; color: var(--accent); letter-spacing: 4px; }
  .finish-sub { font-size: 11px; letter-spacing: 2px; color: var(--muted); margin: 8px 0 24px; }

  .flash { position: fixed; inset: 0; background: rgba(232,255,60,0.12); pointer-events: none; opacity: 0; z-index: 50; transition: opacity 0.05s; }
  .flash.pop { opacity: 1; }
</style>
</head>
<body>

<audio id="iosSilence" loop playsinline style="display:none">
  <source src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA/+M4wAAAAAAAAAAAAEluZm8AAAAPAAAAAwAAAbAAqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV////////////////////////////////////////////AAAAAExhdmM1OC41NAAAAAAAAAAAAAAAACQDkAAAAAAAAbBRajkAAAAAAAAAAAAAAAAAAAAA/+MYxAANCAZhUUAAAmlTEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV/+MYxDsAAANIAAAAAFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV" type="audio/mp3">
</audio>

<div class="profile-screen" id="profileScreen">
  <div class="profile-logo">EMOM</div>
  <div class="profile-label">Vem tränar?</div>
  <div class="profile-btns">
    <button class="profile-btn" onclick="selectProfile('Andreas')">Andreas</button>
    <button class="profile-btn" onclick="selectProfile('Johanna')">Johanna</button>
  </div>
</div>

<div class="wrap" id="appWrap" style="display:none">
  <header>
    <div class="logo">EMOM</div>
    <div class="profile-avatar" id="profileAvatar" onclick="switchProfile()" title="Byt profil">A</div>
  </header>

  <div class="main-card" id="mainCard">
    <div class="main-card-bar" id="topBar"></div>
    <div class="main-card-meta" id="cardMeta">Klar att köra?</div>
    <div class="main-card-timer" id="timerDisplay">1:00</div>
    <div class="main-card-body">
      <div class="ex-name" id="exName">Tryck START</div>
      <div class="ex-reps" id="exReps"></div>

  </div>

  <div class="next-card" id="nextCard">
    <div class="next-label">Härnäst</div>

      <div class="next-name" id="nextName">–</div>
      <div class="next-reps" id="nextReps"></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="totalDisplay">20:00</div><div class="stat-lbl">Kvar totalt</div></div>
    <div class="stat-box"><div class="stat-val" id="roundDisplay">–</div><div class="stat-lbl">Varv</div></div>
    <div class="stat-box"><div class="stat-val" id="minDisplay">–</div><div class="stat-lbl">Minut</div></div>

  <div class="controls">

</div>

<div class="editor-overlay" id="editorOverlay">

  </div>

</div>

<div class="countdown-overlay" id="countdownOverlay">
  <div class="countdown-num" id="countdownNum">5</div>
  <div class="countdown-label" id="countdownLabel">Gör dig redo...</div>
</div>

<div class="finish-overlay" id="finishOverlay">
  <div class="finish-trophy">🏆</div>
  <div class="finish-title">Klart!</div>
  <div class="finish-sub" id="finishSub">20 minuter · 5 varv avklarade!</div>
  <button class="btn btn-primary" onclick="resetTimer();document.getElementById('finishOverlay').classList.remove('show');" style="max-width:200px">↺ Kör igen</button>
</div>

<div class="flash" id="flash"></div>

<script>
const DEFAULT_EXERCISES = [
  { name:"Utfallssteg",           reps:"16–20 st totalt" },
  { name:"Armhävningar",          reps:"12–15 st"        },
  { name:"Air Squats",            reps:"20 st"           },
  { name:"Plankan Shoulder Taps", reps:"20 st totalt"    },
];

let currentProfile = null;
let EXERCISES = [];

function getKey(p) { return 'emom_ex_' + p; }
function loadEx(p) { const s=localStorage.getItem(getKey(p)); return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_EXERCISES)); }

function selectProfile(name) {
  currentProfile = name;
  EXERCISES = loadEx(name);
  document.getElementById('profileScreen').classList.add('hidden');
  document.getElementById('appWrap').style.display = '';
  document.getElementById('profileAvatar').textContent = name[0];
  resetTimer();
}

function updateTagline() {
  // no tagline element in this version — info shown in stats
}

function switchProfile() {
  if (running) return;
  resetTimer();
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('profileScreen').classList.remove('hidden');
}

// Editor — with add/remove support
let _editExercises = []; // working copy while editing

function renderEditorCards() {
  const c = document.getElementById('editorCards');
  const totalMin = _editExercises.length * 5;
  c.innerHTML = '';
  c.innerHTML += `<div class="editor-count-info">${_editExercises.length} ÖVNINGAR · 5 VARV · ${totalMin} MIN TOTALT</div>`;
  _editExercises.forEach((ex, i) => {
    c.innerHTML += `<div class="editor-card" id="ecard${i}">
      <div class="editor-card-hdr">
        <span style="font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase">Minut ${i+1}</span>
        ${_editExercises.length > 2 ? `<button class="btn-remove-ex" onclick="removeExercise(${i})">✕ Ta bort</button>` : ''}
      </div>
      <div class="editor-field"><label>Namn</label><input id="en${i}" value="${ex.name}"></div>
      <div class="editor-field"><label>Reps</label><input id="er${i}" value="${ex.reps}"></div>
    </div>`;
  });
  if (_editExercises.length < 6) {
    c.innerHTML += `<button class="btn-add-ex" onclick="addExercise()">+ Lägg till övning</button>`;
  }
}

function openEditor() {
  if (running) return;
  document.getElementById('editorSub').textContent = currentProfile + 's övningar';
  _editExercises = JSON.parse(JSON.stringify(EXERCISES));
  renderEditorCards();
  document.getElementById('editorOverlay').classList.add('show');
}

function addExercise() {
  // Save current inputs before adding
  _editExercises.forEach((ex,i) => {
    const n=document.getElementById('en'+i)?.value.trim();
    const r=document.getElementById('er'+i)?.value.trim();
    if(n) ex.name=n; if(r) ex.reps=r;
  });
  _editExercises.push({ name: 'Ny övning', reps: '10 st' });
  renderEditorCards();
  // Scroll to bottom and focus new name field
  setTimeout(() => {
    const last = _editExercises.length - 1;
    const inp = document.getElementById('en'+last);
    if (inp) { inp.focus(); inp.select(); }
    document.getElementById('editorOverlay').scrollTop = 99999;
  }, 50);
}

function removeExercise(idx) {
  // Save current inputs first
  _editExercises.forEach((ex,i) => {
    const n=document.getElementById('en'+i)?.value.trim();
    const r=document.getElementById('er'+i)?.value.trim();
    if(n) ex.name=n; if(r) ex.reps=r;
  });
  _editExercises.splice(idx, 1);
  renderEditorCards();
}

function closeEditor() { document.getElementById('editorOverlay').classList.remove('show'); }

function saveExercises() {
  _editExercises.forEach((ex,i) => {
    const n=document.getElementById('en'+i)?.value.trim();
    const r=document.getElementById('er'+i)?.value.trim();
    if(n) ex.name=n; if(r) ex.reps=r;
  });
  EXERCISES = _editExercises;
  localStorage.setItem(getKey(currentProfile), JSON.stringify(EXERCISES));
  closeEditor();
  resetTimer(); // recalculate totals
}

const ROUNDS = 5;
let timer=null, countdownInterval=null;
let secondsLeft=60, totalSecondsLeft=0;
let currentMinute=0, running=false, paused=false;

function getTotalMinutes() { return EXERCISES.length * ROUNDS; }

// AUDIO
let _ac=null, _reverb=null, _audioReady=false;

function initAudio() {
  if (_audioReady) return;
  _ac = new (window.AudioContext || window.webkitAudioContext)();
  const sb=_ac.createBuffer(1,1,_ac.sampleRate), ss=_ac.createBufferSource();
  ss.buffer=sb; ss.connect(_ac.destination); ss.start(0);
  if (_ac.state==='suspended') _ac.resume();
  const rl=Math.floor(_ac.sampleRate*1.5), rb=_ac.createBuffer(2,rl,_ac.sampleRate);
  for(let ch=0;ch<2;ch++){const d=rb.getChannelData(ch);for(let i=0;i<rl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rl,2.5);}
  _reverb=_ac.createConvolver(); _reverb.buffer=rb; _reverb.connect(_ac.destination);
  _audioReady=true;
  const sil=document.getElementById('iosSilence'); if(sil)sil.play().catch(()=>{});
}

function _bell(freq,dur,vol,delay) {
  if(!_ac||!_audioReady) return;
  const t0=_ac.currentTime+0.02+(delay||0);
  const mk=(type,f,v,d)=>{
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(v,t0+0.004);
    g.gain.exponentialRampToValueAtTime(v*0.4,t0+0.04);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+d);
    o.connect(g); g.connect(_ac.destination); o.start(t0); o.stop(t0+d+0.05);
  };
  mk('triangle',freq,vol,dur);
  mk('sine',freq*3,vol*0.18,dur*0.4);
  if(_reverb){const o3=_ac.createOscillator(),g3=_ac.createGain();o3.type='triangle';o3.frequency.value=freq;g3.gain.setValueAtTime(0,t0);g3.gain.linearRampToValueAtTime(vol*0.15,t0+0.004);g3.gain.exponentialRampToValueAtTime(0.0001,t0+dur);o3.connect(g3);g3.connect(_reverb);o3.start(t0);o3.stop(t0+dur+0.05);}
}

const N={G3:196,C4:261.63,E4:329.63,G4:392,C5:523.25};
function playSound(name) {
  if(!_audioReady) return;
  if(name==='tick')  {_bell(N.C4,0.5,3.0,0);}
  else if(name==='signal'){_bell(N.C4,0.6,3.2,0);_bell(N.E4,0.6,3.2,0.22);_bell(N.G4,0.9,3.5,0.44);}
  else if(name==='go')   {_bell(N.C4,1.0,3.5,0);_bell(N.E4,1.0,3.0,0.04);_bell(N.G4,1.0,2.8,0.08);_bell(N.C5,1.0,2.8,0.12);}
  else if(name==='finish'){_bell(N.C4,0.7,3.2,0);_bell(N.E4,0.7,3.2,0.20);_bell(N.G4,0.7,3.2,0.40);_bell(N.C5,1.5,3.8,0.60);}
}

// WAKE LOCK
let wakeLock=null;
async function requestWakeLock() {
  if(!('wakeLock' in navigator)){setWL(false,'EJ STÖDD');return;}
  try{wakeLock=await navigator.wakeLock.request('screen');setWL(true,'SKÄRM PÅ');wakeLock.addEventListener('release',()=>setWL(false,'SKÄRM AV'));}
  catch(e){setWL(false,'EJ AKTIV');}
}
function releaseWakeLock(){if(wakeLock){wakeLock.release();wakeLock=null;}setWL(false,'SKÄRM EJ AKTIV');}
function setWL(active,text){const p=document.getElementById('wakelockPill');document.getElementById('wakelockText').textContent=text;p.className='wakelock-pill'+(active?' active':'');}
document.addEventListener('visibilitychange',async()=>{if(document.visibilityState==='visible'&&running)await requestWakeLock();});

// TIMER
function flashScreen(){const f=document.getElementById('flash');f.classList.add('pop');setTimeout(()=>f.classList.remove('pop'),200);}
function getExIdx(m){return m%EXERCISES.length;}
function getRound(m){return Math.floor(m/EXERCISES.length)+1;}
function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

function updateCards(minute) {
  const cur=EXERCISES[getExIdx(minute)];
  const nxt=EXERCISES[getExIdx(minute+1)];
  const round=getRound(minute);
  document.getElementById('cardMeta').textContent=`▶ NU · Minut ${minute+1} · Varv ${round}`;
  document.getElementById('exName').textContent=cur.name;
  document.getElementById('exReps').textContent=cur.reps;
  const nc=document.getElementById('nextCard');
  if(minute+1<getTotalMinutes()){
    nc.style.display='';
    document.getElementById('nextName').textContent=nxt.name;
    document.getElementById('nextReps').textContent=nxt.reps;
  } else { nc.style.display='none'; }
  updateLaps(round-1);
}

function updateLaps(done) {
  const lapRow = document.getElementById('lapDots');
  // Rebuild dots if count changed
  if (lapRow.children.length !== ROUNDS) {
    lapRow.innerHTML = '';
    for (let i=0;i<ROUNDS;i++) {
      const d=document.createElement('div');
      d.id='lap'+i; d.className='lap-dot';
      lapRow.appendChild(d);
    }
  }
  for(let i=0;i<ROUNDS;i++) {
    const el=document.getElementById('lap'+i);
    if(el) el.className='lap-dot'+(i<done?' done':i===done?' current':'');
  }
}

function updateClock(){
  const disp=document.getElementById('timerDisplay');
  disp.textContent=fmt(secondsLeft);
  document.getElementById('totalDisplay').textContent=fmt(totalSecondsLeft);
  document.getElementById('roundDisplay').textContent=getRound(currentMinute)+'/'+ROUNDS;
  document.getElementById('minDisplay').textContent=(currentMinute+1)+'/'+getTotalMinutes();
  document.getElementById('topBar').style.transform=`scaleX(${(60-secondsLeft)/60})`;
  disp.className='main-card-timer';
  if(secondsLeft<=5&&secondsLeft>0) disp.classList.add('warning');
  else if(secondsLeft===60||secondsLeft===0) disp.classList.add('go');
}

function tick(){
  if(!running) return;
  if(secondsLeft<=5&&secondsLeft>0) playSound('tick');
  secondsLeft--; totalSecondsLeft--;
  updateClock();
  if(secondsLeft<0){
    currentMinute++;
    if(currentMinute>=getTotalMinutes()){finishWorkout();return;}
    secondsLeft=59;
    playSound('signal'); flashScreen();
    updateCards(currentMinute); updateClock();
  }
}

function startTimer(){
  if(running) return;
  initAudio(); requestWakeLock();
  if(paused){
    running=true;paused=false;
    timer=setInterval(tick,1000);
    document.getElementById('btnStart').disabled=true;
    document.getElementById('btnPause').disabled=false;
    return;
  }
  document.getElementById('btnStart').disabled=true;
  document.getElementById('btnPause').disabled=true;
  let count=5;
  const overlay=document.getElementById('countdownOverlay');
  const numEl=document.getElementById('countdownNum');
  const lblEl=document.getElementById('countdownLabel');
  overlay.classList.add('show');
  numEl.textContent=count; numEl.className='countdown-num';
  lblEl.textContent='Gör dig redo...';
  playSound('tick');
  countdownInterval=setInterval(()=>{
    count--;
    if(count>0){numEl.textContent=count;void numEl.offsetWidth;numEl.className='countdown-num';playSound('tick');}
    else{
      clearInterval(countdownInterval);
      numEl.textContent='KÖR!';numEl.className='countdown-num go-text';lblEl.textContent='';
      playSound('go');
      setTimeout(()=>{
        overlay.classList.remove('show');
        running=true;paused=false;
        playSound('signal');flashScreen();
        updateCards(0);
        secondsLeft=59;totalSecondsLeft=getTotalMinutes()*60-1;
        updateClock();
        timer=setInterval(tick,1000);
        document.getElementById('btnStart').disabled=true;
        document.getElementById('btnPause').disabled=false;
      },700);
    }
  },1000);
}

function pauseTimer(){
  if(!running) return;
  running=false;paused=true;
  clearInterval(timer);releaseWakeLock();
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnStart').textContent='▶ Fortsätt';
  document.getElementById('btnPause').disabled=true;
}

function resetTimer(){
  running=false;paused=false;
  clearInterval(timer);clearInterval(countdownInterval);
  document.getElementById('countdownOverlay').classList.remove('show');
  releaseWakeLock();
  currentMinute=0;secondsLeft=60;totalSecondsLeft=getTotalMinutes()*60;
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnStart').textContent='▶ Start';
  document.getElementById('btnPause').disabled=true;
  document.getElementById('timerDisplay').textContent='1:00';
  document.getElementById('timerDisplay').className='main-card-timer';
  document.getElementById('topBar').style.transform='scaleX(0)';
  document.getElementById('cardMeta').textContent='Klar att köra?';
  document.getElementById('exName').textContent='Tryck START';
  document.getElementById('exReps').textContent='';
  document.getElementById('totalDisplay').textContent=fmt(getTotalMinutes()*60);
  document.getElementById('roundDisplay').textContent='–';
  document.getElementById('minDisplay').textContent='–';
  document.getElementById('nextCard').style.display='';
  document.getElementById('nextName').textContent='–';
  document.getElementById('nextReps').textContent='';
  updateLaps(-1); // reset all dots
}

function finishWorkout(){
  running=false;clearInterval(timer);
  playSound('finish');
  for(let i=0;i<5;i++) document.getElementById('lap'+i).className='lap-dot done';
  document.getElementById('finishSub').textContent=currentProfile+' · '+getTotalMinutes()+' min · '+ROUNDS+' varv klara!';
  setTimeout(()=>document.getElementById('finishOverlay').classList.add('show'),1200);
}
</script>
